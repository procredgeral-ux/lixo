[build]
builder = "nixpacks"

[build.nixpacks]
python_version = "3.11"

[deploy]
startCommand = "python start_railway.py"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.envs]
RAILWAY_ENVIRONMENT = "production"
ENVIRONMENT = "production"
DEBUG = "false"
LOG_LEVEL = "INFO"
