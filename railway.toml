[build]
builder = "nixpacks"

[build.nixpacks]
python_version = "3.11"

[deploy]
startCommand = "python init_database.py && python -m uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.envs]
RAILWAY_ENVIRONMENT = "production"
ENVIRONMENT = "production"
DEBUG = "false"
LOG_LEVEL = "INFO"
