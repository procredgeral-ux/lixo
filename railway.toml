[build]
builder = "nixpacks"

[build.nixpacks]
python_version = "3.11"

[deploy]
startCommand = "bash start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.envs]
RAILWAY_ENVIRONMENT = "production"
ENVIRONMENT = "production"
DEBUG = "true"
LOG_LEVEL = "INFO"
REDIS_ENABLED = "true"
