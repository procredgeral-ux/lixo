version: '3.8'

services:
  app:
    build: .
    container_name: tunestrade-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/tunestrade
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    depends_on:
      - db
      - redis
    networks:
      - tunestrade-network
    volumes:
      - ./logs:/app/logs

  db:
    image: postgres:15-alpine
    container_name: tunestrade-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=tunestrade
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tunestrade-network
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: tunestrade-redis
    restart: always
    networks:
      - tunestrade-network
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    container_name: tunestrade-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - tunestrade-network

volumes:
  postgres_data:
  redis_data:

networks:
  tunestrade-network:
    driver: bridge
